gate: secrets
version: "1.1"
status: active
purpose: "Verhindert Secret-Zugriff, Secret-Persistenz und Secret-Leaks in Outputs."
on_fail: BLOCKED

inputs:
  policy: harness/policies/secrets.yaml
  scan_roots: [SECURITY.md, README.md, core, harness, validation, adapters, agents, skills, docs, prompts, projects, kontext]
  excluded_paths: [.git/**]

severity: critical

checks:
  secrets_policy_exists_and_active:
    severity: critical
    require_file: harness/policies/secrets.yaml
    require_key_value: {status: active}
    fail_if: [missing_secret_policy, inactive_secret_policy]
  block_secret_file_access:
    severity: critical
    blocked_paths: [.env, .env.*, "**/.env", "**/.env.*"]
    allow_paths: [.env.example, "**/.env.example"]
    fail_if: [secret_file_read_attempt, secret_file_write_attempt]
  scan_before_persist:
    severity: critical
    tools: [write, edit]
    use_patterns_from: harness/policies/secrets.yaml
    fail_if: [secret_pattern_detected_before_persist]
  redact_before_output:
    severity: high
    applies_to: [tool_output, logs, audit, snapshots, memory]
    replacement: "[REDACTED_SECRET]"
    fail_if: [unredacted_secret_in_output]
  forbid_secret_prompt_injection:
    severity: critical
    patterns: ["(?i)read .*\\.env", "(?i)print .*token", "(?i)show .*secret"]
    fail_if: [secret_exfiltration_instruction]
  pipeline_and_reasoning_outputs_are_scanned:
    severity: critical
    applies_to: [projects/**/p3/**, projects/**/state.md, kontext/memory/**, prompts/snapshot/**, harness/reasoning/**]
    fail_if: [secret_pattern_in_persisted_artifact]
  env_example_must_keep_secret_fields_empty:
    severity: high
    file: .env.example
    secret_keys: [OPENAI_API_KEY, ANTHROPIC_API_KEY, GITHUB_TOKEN]
    non_secret_defaults_allowed: true
    fail_if: [secret_field_non_empty]

fail_conditions:
  - missing_secret_policy
  - inactive_secret_policy
  - secret_file_read_attempt
  - secret_file_write_attempt
  - secret_pattern_detected_before_persist
  - unredacted_secret_in_output
  - secret_exfiltration_instruction
  - secret_pattern_in_persisted_artifact
  - secret_field_non_empty

output_report:
  path: validation/reports/secret-gate.report.md
  required_fields: [gate, status, scanned_paths, detections, redactions, failures, warnings, evidence, next_action]
  status_values: [PASS, WARN, FAIL]
  evidence_format: "relative_path:key_or_line:pattern_name"
