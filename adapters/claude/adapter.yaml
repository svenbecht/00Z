adapter: claude
entrypoint: adapters/claude/CLAUDE.md
supports_slash_commands: false
supports_extensions: false
language: de
boot:
  source: core/BOOT_PROTOCOL.md
  security_sources:
    - SECURITY.md
    - harness/policies/tools.yaml
    - harness/policies/filesystem.yaml
    - harness/policies/protected_paths.yaml
    - harness/policies/secrets.yaml
    - harness/policies/network.yaml
    - harness/policies/prompt-injection.yaml
    - harness/policies/onboarding.yaml
    - validation/policy-gate.yaml
    - validation/placeholder-gate.yaml
    - validation/onboarding-gates.yaml
    - validation/secret-gates.yaml
    - validation/filesystem-gates.yaml
    - validation/prompt-injection-gates.yaml
    - validation/adapter-gate.yaml
    - validation/pipeline-gate.yaml
security:
  read_only_if_policy_missing: true
  untrusted_content_default: true
  env_files_blocked: true
  require_tool_call_contract: true
  require_onboarding_guide: docs/onboarding.md
  require_gates_before_mutation: [onboarding_gate, policy_gate, filesystem_gate, secret_gate, prompt_injection_gate, adapter_gate]
  no_chain_of_thought_disclosure: true
  no_project_write_until_ready_mutating: true
  blocked_response_prefix: "BLOCKED:"
  warn_response_prefix: "WARN:"
  pass_response_prefix: "PASS:"
runtime_contract:
  local_runtime_tools: [tools/zen_validate.py, tools/zen_test_negative.py, tools/zen_test_all.py, tools/zen_adapter_smoke.py]
  native_runtime_implemented: false
  productive_project_writes_enabled: false
  check_only_no_report: true
  report_root: validation/reports
readiness:
  checklist: docs/readiness.md
  required_local_checks: [zen_validate_check_only, zen_test_negative_check_only, zen_test_all_check_only, zen_adapter_smoke_check_only]
context_management:
  runtime: harness/runtime.yaml
  manifest: harness/context_manifest.yaml
  cache_policy: harness/cache_policy.yaml
  budget_policy: harness/budget_policy.yaml
  boot_profile: boot
  cache_root: .claude/cache
  use_summaries_first: true
  cold_memory_auto_load: false
reasoning:
  catalog: harness/reasoning/reasoning_catalog.yaml
  routing: harness/reasoning/reasoning_routing.yaml
  output_schema: harness/reasoning/reasoning_output.schema.json
  reveal_chain_of_thought: false
  max_optional_methods: 3
  target_output_tokens: 500
  hard_output_tokens: 700
tools:
  prefer: [read, grep, find]
  gated: [write, edit]
  restrict: [bash, network]
  default_decision: deny_mutating
validation_flow:
  trigger: ZEN VALIDATE
  runtime_implemented: true
  native_runtime_implemented: false
  roadmap_note: "Native Claude command/adapter runtime is not bundled yet; local validator tools/zen_validate.py is implemented."
  gates:
    - validation/schema-gate.yaml
    - validation/placeholder-gate.yaml
    - validation/policy-gate.yaml
    - validation/onboarding-gates.yaml
    - validation/secret-gates.yaml
    - validation/filesystem-gates.yaml
    - validation/prompt-injection-gates.yaml
    - validation/adapter-gate.yaml
    - validation/pipeline-gate.yaml
    - validation/performance-gate.yaml
natural_language_triggers:
  zen_new: ["Starte ZEN NEW", "Neues ZEN Projekt"]
  zen_memory_init: ["Initialisiere ZEN Memory", "ZEN MEMORY INIT"]
  zen_new_build: ["Erstelle ZEN Agenten", "ZEN NEW BUILD"]
  zen_status: ["ZEN Status", "Was ist der Stand?"]
  zen_plan: ["Neuer ZEN Plan", "ZEN PLAN"]
  zen_snapshot: ["ZEN Snapshot", "Session Handoff"]
  zen_p1: ["ZEN Ask Modus"]
  zen_p2: ["ZEN Prompt Brief"]
  zen_p3: ["ZEN Multi-Agent"]
  zen_reset: ["ZEN Reset", "Abbrechen"]
  zen_validate: ["ZEN Validate", "Validiere ZEN"]
pipeline_routes:
  zen_p1: harness/pipelines/p1.yaml
  zen_p2: harness/pipelines/p2.yaml
  zen_p3: harness/pipelines/p3.yaml
