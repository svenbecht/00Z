policy: secrets
version: "1.1"
status: active
owner: security
principle: secrets_never_enter_agent_context
clarification: "Diese Policy existiert aktiv. Echte .env-Dateien sind für Agenten tabu; nur .env.example ist als leeres Template erlaubt. Policy-Dateien wie harness/policies/secrets.yaml bleiben als Security-Konfiguration lesbar und sind keine Secret-Datendateien."

policy_file_exceptions:
  readable_policy_files:
    - harness/policies/secrets.yaml
  rationale: "Security-Policies müssen zur Gate-Auswertung lesbar bleiben; echte Secret-Dateien und Credentials bleiben blockiert."

secret_files:
  blocked_read:
    - .env
    - .env.*
    - "**/.env"
    - "**/.env.*"
    - "**/*secret*"
    - "**/*credential*"
  blocked_write:
    - .env
    - .env.*
    - "**/.env"
    - "**/.env.*"
  allowed_templates:
    - .env.example
    - "**/.env.example"
  allowed_policy_files:
    - harness/policies/secrets.yaml
  template_constraints:
    require_empty_values: true
    forbid_real_tokens: true
    allow_variable_names_only: true

forbidden_patterns:
  - name: generic_secret_assignment
    regex: "(?i)(api[_-]?key|password|token|secret)\\s*[:=]\\s*['\"]?[^\\s'\"]{8,}"
    severity: high
  - name: openai_key
    regex: "sk-[A-Za-z0-9_-]{20,}"
    severity: critical
  - name: anthropic_key
    regex: "sk-ant-[A-Za-z0-9_-]{20,}"
    severity: critical
  - name: github_token
    regex: "gh[pousr]_[A-Za-z0-9_]{20,}"
    severity: critical
  - name: private_key
    regex: "-----BEGIN (RSA|OPENSSH|EC|DSA)? ?PRIVATE KEY-----"
    severity: critical
  - name: jwt
    regex: "eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+"
    severity: high

redaction:
  enabled: true
  replacement: "[REDACTED_SECRET]"

enforcement:
  before_read: block_secret_files
  before_write: scan_and_block
  before_edit: scan_and_block
  before_log: redact
  before_snapshot: scan_and_block
  before_memory_write: scan_and_block
  before_reasoning_persist: scan_and_block
  before_pipeline_persist: scan_and_block
  before_adapter_output: redact

on_detection: BLOCKED
