id: zen-new
version: 0.2.0
status: ready
mode: guarded
purpose: "Neues Projektprofil vorbereiten; Persistenz nur nach Mutationsfreigabe."
run_state_transition:
  start_from: [READY_READONLY, READY_MUTATING]
  on_start: RUNNING
  on_success: DONE
  on_blocked: BLOCKED
  on_failure: FAILED
mutation:
  readonly_intake_allowed_from: READY_READONLY
  readonly_intake_outputs: [intake_summary, dry_run_plan]
  persist_requires_state: READY_MUTATING
  required_state: READY_MUTATING
  requires_confirmation: true
  allowed_after_gates: [onboarding_gate, policy_gate, filesystem_gate, secret_gate, prompt_injection_gate]
preconditions:
  - read_before_write
  - onboarding_gate
  - policy_gate
  - filesystem_gate
  - secret_gate
  - prompt_injection_gate
inputs:
  - user_request
  - project_name
  - success_criteria
outputs:
  - projects/{project}/state.md
  - projects/{project}/plan.md
reads:
  - docs/onboarding.md
  - projects/README.md
  - projects/templates/state.md
  - projects/templates/plan.md
writes:
  - projects/{project}/state.md
  - projects/{project}/plan.md
gates:
  before_start: [policy_gate, onboarding_gate]
  before_write: [filesystem_gate, secret_gate, prompt_injection_gate]
failure_modes:
  - missing_project_name: BLOCKED
  - unsafe_path_or_traversal: BLOCKED
  - secret_detected: BLOCKED
  - user_confirmation_missing: BLOCKED
notes: "ZEN NEW ist mutierend und benötigt READY_MUTATING sowie explizite Bestätigung."
